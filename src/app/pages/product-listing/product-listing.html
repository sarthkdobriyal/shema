<section class="px-4 sm:px-8 py-8 sm:py-12">
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6 mb-8 sm:mb-10">
    <div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-2">{{ title() }}</h1>
      <div class="w-16 h-1 bg-yellow-400"></div>
    </div>

    <div class="flex gap-6">
      <label class="flex flex-col text-sm text-slate-600">
        Show
        <select class="border rounded px-3 py-2 mt-1">
          <option>All</option>
        </select>
      </label>
      <label class="flex flex-col text-sm text-slate-600">
        Filter by
        <select class="border rounded px-3 py-2 mt-1">
          <option>Latest</option>
        </select>
      </label>
    </div>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 lg:gap-8">
    @for (p of products(); track p.id) {
      <app-product-card [product]="p" />
    }
  </div>

  <div class="text-center mt-10 sm:mt-12">
    <button
      type="button"
      class="bg-yellow-400 rounded-full px-8 py-3 font-bold text-slate-900"
    >
      SHOW MORE
    </button>
  </div>
</section>
