<section class="bg-yellow-300 flex flex-col md:flex-row items-center px-4 sm:px-8 md:px-20 py-10 sm:py-16 gap-8">
  <div class="flex-1 text-center md:text-left">
    <p class="uppercase font-semibold tracking-wide text-slate-900 mb-3">
      Up to 25% discount
    </p>
    <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold text-slate-900 leading-tight mb-6">
      Checkout The Best<br />Fashion Style
    </h1>
    <a
      routerLink="/men"
      class="inline-block border-2 border-slate-900 rounded-full px-8 py-3 font-bold text-slate-900 hover:bg-slate-900 hover:text-yellow-300 transition"
    >
      SHOP NOW
    </a>
  </div>
  <div class="flex-1 flex justify-center">
    <img
      src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=700"
      alt="Fashion model"
      class="w-full max-w-sm md:max-w-none max-h-72 sm:max-h-96 md:max-h-125 object-cover rounded"
    />
  </div>
</section>

<section class="px-4 sm:px-8 py-12 sm:py-16 text-center">
  <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-2">Featured Categories</h2>
  <div class="w-16 h-1 bg-yellow-400 mx-auto mb-10 sm:mb-12"></div>

  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 lg:gap-10">
    @for (cat of featuredCategories; track cat.label) {
      <div class="border border-gray-200 shadow-sm">
        <img [src]="cat.imageUrl" [alt]="cat.label" class="w-full h-40 sm:h-60 lg:h-80 object-cover" />
        <div class="py-4">
          <a
            [routerLink]="cat.routerLink"
            class="inline-block bg-yellow-400 rounded-full px-4 sm:px-6 py-2 text-sm sm:text-base font-bold text-slate-900"
          >
            SHOP NOW
          </a>
        </div>
      </div>
    }
  </div>
</section>
