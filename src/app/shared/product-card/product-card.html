<a
  [routerLink]="['/product', product().id]"
  class="w-full border border-gray-200 shadow-sm block hover:shadow-md transition"
>
  <img
    [src]="product().imageUrl"
    [alt]="product().name"
    class="w-full h-36 sm:h-56 lg:h-72 object-cover"
  />
  <div class="p-3 sm:p-4">
    <h3 class="text-sm sm:text-base font-bold text-slate-900">{{ product().name }}</h3>
    <p class="text-xs sm:text-sm text-slate-600 mb-2 line-clamp-2">{{ product().description }}</p>
    <p class="text-sm sm:text-base font-bold text-slate-900">${{ product().price.toFixed(2) }}</p>
  </div>
</a>
